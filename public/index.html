<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MuscleReal — 筋トレしないと投稿できないSNS</title>
  <meta name="description" content="本物のトレーニーだけのための招待制フィットネスSNS。AIが筋トレ風景を厳しく審査し、クリアした者だけが今日の成果を共有できる。今日をサボれば投稿不可能。">
  <meta name="theme-color" content="#080810">
  
  <!-- OGP / SEO Tags -->
  <meta property="og:title" content="MuscleReal | 筋トレしないと投稿できないSNS">
  <meta property="og:description" content="AIがあなたのワークアウトを審査する。本物のトレーニーだけが集う、妥協なきフィットネスSNS。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://musclereal.onrender.com/">
  <!-- Using a placeholder image or a nice gradient for og:image since we don't have a static asset yet -->
  <meta property="og:image" content="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=1200&q=80">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MuscleReal - 筋トレしないと投稿できないSNS">
  <meta name="twitter:description" content="AI審査を突破せよ。サボれば投稿できない硬派なSNS。">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .lp-hero {
      text-align: center;
      margin-bottom: 32px;
      padding: 0 16px;
    }
    .lp-hero h1 {
      font-size: 42px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--orange), #0077FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    .lp-hero p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .lp-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
      text-align: left;
    }
    .lp-feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg-card);
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }
    .lp-feature-icon {
      font-size: 24px;
    }
    .lp-feature-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .lp-feature-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

<div class="auth-page" id="authPage">

  <!-- LP Hero -->
  <div class="lp-hero">
    <h1>MuscleReal</h1>
    <p>言い訳は不要。<br><strong>「今日、筋トレをした者」</strong>だけが参加できる<br>妥協なきフィットネスSNS。</p>
  </div>

  <div class="lp-features">
    <div class="lp-feature">
      <div class="lp-feature-icon">🤖</div>
      <div>
        <div class="lp-feature-title">AIによる厳格な動画審査</div>
        <div class="lp-feature-desc">投稿される動画はすべてAIが解析。「本当に健康的なアクションをしているか」を厳しく判定します。</div>
      </div>
    </div>
    <div class="lp-feature">
      <div class="lp-feature-icon">🔒</div>
      <div>
        <div class="lp-feature-title">内輪だけのグループ機能</div>
        <div class="lp-feature-desc">全世界公開だけでなく、合言葉を知るジム仲間だけの「クローズドなコミュニティ」で切磋琢磨できます。</div>
      </div>
    </div>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">新規登録</button>
    </div>

    <!-- Login Form -->
    <div id="formLogin">
      <div class="form-group">
        <label class="form-label" for="loginUsername">ユーザー名</label>
        <input class="form-input" type="text" id="loginUsername" placeholder="@username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">パスワード</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full btn-lg" id="loginBtn" onclick="handleLogin()">
        🔓 ログイン
      </button>
    </div>

    <!-- Signup Form -->
    <div id="formSignup" class="hidden">
      <div class="form-group">
        <label class="form-label" for="signupUsername">ユーザー名</label>
        <input class="form-input" type="text" id="signupUsername" placeholder="@username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="signupDisplayName">表示名</label>
        <input class="form-input" type="text" id="signupDisplayName" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label" for="signupPassword">パスワード</label>
        <input class="form-input" type="password" id="signupPassword" placeholder="8文字以上" autocomplete="new-password">
      </div>
      <button class="btn btn-gold btn-full btn-lg" id="signupBtn" onclick="handleSignup()">
        💪 トレーニーとして登録
      </button>
      <p class="text-xs text-muted text-center mt-8">
        登録することで、毎日筋トレすることに同意したものとみなします💀
      </p>
    </div>

    <!-- Demo accounts hint -->
    <div class="divider-text mt-16">デモアカウント</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
      <button class="btn btn-ghost btn-sm" onclick="demoLogin('tanaka', 'tanaka123')">
        🏋️ tanaka
      </button>
      <button class="btn btn-ghost btn-sm" onclick="demoLogin('yuki', 'yuki123')">
        💪 yuki
      </button>
    </div>
  </div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/app.js"></script>
<script>
  // Redirect if already logged in
  if (getUser()) {
    window.location.href = 'feed.html';
  }

  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
    document.getElementById('formLogin').classList.toggle('hidden', tab !== 'login');
    document.getElementById('formSignup').classList.toggle('hidden', tab !== 'signup');
  }

  async function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) return showToast('ユーザー名とパスワードを入力してください', 'error');

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ username, password })
      });
      setAuth(data.token, data.user);
      showToast(`おかえり、${data.user.displayName}！💪`, 'success');
      setTimeout(() => window.location.href = 'feed.html', 800);
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  async function handleSignup() {
    const username = document.getElementById('signupUsername').value.trim().replace('@', '');
    const displayName = document.getElementById('signupDisplayName').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!username || !displayName || !password) return showToast('すべての項目を入力してください', 'error');
    if (password.length < 6) return showToast('パスワードは6文字以上にしてください', 'error');
    if (username.length < 2) return showToast('ユーザー名は2文字以上にしてください', 'error');

    try {
      const data = await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({ username, displayName, password })
      });
      setAuth(data.token, data.user);
      showToast(`ようこそ、${displayName}！地獄へ🔥`, 'success');
      setTimeout(() => window.location.href = 'feed.html', 800);
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  function demoLogin(username, password) {
    document.getElementById('loginUsername').value = username;
    document.getElementById('loginPassword').value = password;
    switchTab('login');
    setTimeout(handleLogin, 200);
  }
</script>
</body>
</html>
